version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: recipeak-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: recipeak-server
    ports:
      - '5000:5000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/recipeak
      - NODE_ENV=production
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: recipeak-client
    ports:
      - '3000:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
